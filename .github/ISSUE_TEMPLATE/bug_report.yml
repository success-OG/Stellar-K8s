name: Bug Report
description: Report a non-security bug in Stellar-K8s
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        > **Security vulnerability?** Please use [GitHub Security Advisories](../../security/advisories/new) instead of this form.

  - type: input
    id: version
    attributes:
      label: Stellar-K8s Version
      placeholder: "e.g. 0.1.0"
    validations:
      required: true

  - type: input
    id: k8s-version
    attributes:
      label: Kubernetes Version
      placeholder: "e.g. 1.30.0"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Apply manifest ...
        2. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs / Output
      render: shell
