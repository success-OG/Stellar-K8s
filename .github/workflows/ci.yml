name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUSTFLAGS: -D warnings
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  version-consistency:
    name: Version Consistency Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Verify Cargo.toml and stellar-operator version output
        run: |
          set -euo pipefail

          CARGO_VERSION=$(grep '^version = ' Cargo.toml | head -1 | cut -d'"' -f2)

          EXPECTED_VERSION="${EXPECTED_RELEASE_VERSION:-}"
          if [[ -z "$EXPECTED_VERSION" && "${GITHUB_REF:-}" =~ ^refs/tags/v ]]; then
            EXPECTED_VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          if [[ -z "$EXPECTED_VERSION" ]]; then
            EXPECTED_VERSION="$CARGO_VERSION"
          fi

          cargo build --locked --bin stellar-operator

          BIN_VERSION=$(./target/debug/stellar-operator version | sed -n 's/^Stellar-K8s Operator v//p' | head -1)

          echo "Expected version: $EXPECTED_VERSION"
          echo "Cargo.toml version: $CARGO_VERSION"
          echo "stellar-operator version output: $BIN_VERSION"

          [[ "$CARGO_VERSION" == "$EXPECTED_VERSION" ]] || {
            echo "::error::Cargo.toml version ($CARGO_VERSION) does not match expected release version ($EXPECTED_VERSION)"
            exit 1
          }

          [[ "$BIN_VERSION" == "$EXPECTED_VERSION" ]] || {
            echo "::error::stellar-operator version output ($BIN_VERSION) does not match expected release version ($EXPECTED_VERSION)"
            exit 1
          }

  helm-lint:
    name: Helm Lint & Schema Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Helm
        uses: azure/setup-helm@v5
        with:
          version: "3.14.0"

      - name: Lint chart with default values
        run: make helm-lint

      - name: Lint chart with strict mode
        run: helm lint charts/stellar-operator --strict

      - name: Validate schema rejects invalid logLevel
        run: |
          cat > /tmp/bad-loglevel.yaml <<'EOF'
          operator:
            logLevel: verbose
          EOF
          if helm lint charts/stellar-operator -f /tmp/bad-loglevel.yaml 2>&1 | grep -q "meet the specifications"; then
            echo "Schema correctly rejected invalid logLevel"
          else
            echo "ERROR: Schema did not reject invalid logLevel" && exit 1
          fi

      - name: Validate schema rejects invalid service type
        run: |
          cat > /tmp/bad-service.yaml <<'EOF'
          service:
            type: ExternalName
          EOF
          if helm lint charts/stellar-operator -f /tmp/bad-service.yaml 2>&1 | grep -q "meet the specifications"; then
            echo "Schema correctly rejected invalid service type"
          else
            echo "ERROR: Schema did not reject invalid service type" && exit 1
          fi

      - name: Validate schema rejects invalid pullPolicy
        run: |
          cat > /tmp/bad-pullpolicy.yaml <<'EOF'
          image:
            pullPolicy: Whenever
          EOF
          if helm lint charts/stellar-operator -f /tmp/bad-pullpolicy.yaml 2>&1 | grep -q "meet the specifications"; then
            echo "Schema correctly rejected invalid pullPolicy"
          else
            echo "ERROR: Schema did not reject invalid pullPolicy" && exit 1
          fi

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Run cargo audit
        run: |
          cargo install cargo-audit --locked
          cargo audit --ignore RUSTSEC-2020-0071 --ignore RUSTSEC-2024-0380 --ignore RUSTSEC-2024-0381

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88"
          components: rustfmt, clippy

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci-lint"

      - name: Shellcheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          path_to_shell_files: .
          severity: error
          upload_annotation: true

      - name: Check formatting
        run: make fmt-check

      - name: Run clippy
        run: make lint

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [security-audit, lint, version-consistency]
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci-test"

      - name: Run tests (Unit and Doc)
        run: make test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci-build"

      - name: Build release
        run: make build

      - name: Upload binary artifacts
        uses: actions/upload-artifact@v7
        with:
          name: stellar-k8s-binaries
          path: |
            target/release/stellar-operator
            target/release/kubectl-stellar
          retention-days: 7

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Lowercase IMAGE_NAME
        run: echo "IMAGE_NAME=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6

      - name: Lowercase IMAGE_NAME
        run: echo "IMAGE_NAME=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Run Trivy
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif
