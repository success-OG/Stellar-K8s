name: Performance Regression Testing

on:
  workflow_dispatch:
    inputs:
      baseline_version:
        description: Baseline version to compare against
        required: false
        default: v0.1.0
      regression_threshold:
        description: Regression threshold percentage
        required: false
        default: "10"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  K6_VERSION: 0.54.0
  KIND_VERSION: v0.20.0
  KUBECTL_VERSION: v1.28.0

jobs:
  # ==========================================================================
  # Build Operator
  # ==========================================================================
  build:
    name: Build Operator
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      image_tag: ${{ steps.image.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: |
          VERSION="pr-${{ github.event.pull_request.number }}-$(git rev-parse --short HEAD)"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "perf-regression"

      - name: Build release binary
        run: cargo build --release --locked

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        id: image
        run: |
          IMAGE_TAG="stellar-operator:${{ steps.version.outputs.version }}"
          echo "tag=$IMAGE_TAG" >> $GITHUB_OUTPUT

          docker build -t $IMAGE_TAG .

      - name: Save Docker image
        run: |
          docker save stellar-operator:${{ steps.version.outputs.version }} | gzip > stellar-operator-image.tar.gz

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: operator-artifacts-${{ steps.version.outputs.version }}
          path: |
            target/release/stellar-operator
            stellar-operator-image.tar.gz
          retention-days: 7

  # ==========================================================================
  # Setup Test Environment
  # ==========================================================================
  # Removed: setup-cluster job - now consolidated into performance-test

  # ==========================================================================
  # Run Performance Tests
  # ==========================================================================
  performance-test:
    name: Run Performance Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - name: Install k6
        run: |
          curl -L https://github.com/grafana/k6/releases/download/v${{ env.K6_VERSION }}/k6-v${{ env.K6_VERSION }}-linux-amd64.tar.gz | tar xvz
          sudo mv k6-v${{ env.K6_VERSION }}-linux-amd64/k6 /usr/local/bin/
          k6 version

      - name: Install kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/${{ env.KIND_VERSION }}/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/${{ env.KUBECTL_VERSION }}/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

      - name: Download operator artifacts
        uses: actions/download-artifact@v8
        with:
          name: operator-artifacts-${{ needs.build.outputs.version }}

      - name: Create kind cluster
        run: |
          cat > kind-config.yaml <<EOF
          kind: Cluster
          apiVersion: kind.x-k8s.io/v1alpha4
          nodes:
            - role: control-plane
              extraPortMappings:
                - containerPort: 30080
                  hostPort: 30080
                  protocol: TCP
            - role: worker
            - role: worker
          EOF

          kind create cluster --name benchmark --config kind-config.yaml --wait 5m

      - name: Load Docker image into kind
        run: |
          gunzip stellar-operator-image.tar.gz
          kind load image-archive stellar-operator-image.tar --name benchmark

      - name: Install CRDs
        run: |
          kubectl apply -f config/crd/stellarnode-crd.yaml
          kubectl wait --for condition=established --timeout=60s crd/stellarnodes.stellar.org

      - name: Create operator namespace
        run: |
          kubectl create namespace stellar-system
          kubectl label namespace stellar-system name=stellar-system

      - name: Deploy operator
        run: |
          cat > operator-deployment.yaml <<EOF
          apiVersion: v1
          kind: ServiceAccount
          metadata:
            name: stellar-operator
            namespace: stellar-system
          ---
          apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRole
          metadata:
            name: stellar-operator
          rules:
            - apiGroups: ["stellar.org"]
              resources: ["stellarnodes", "stellarnodes/status"]
              verbs: ["*"]
            - apiGroups: [""]
              resources: ["pods", "services", "configmaps", "secrets", "events"]
              verbs: ["*"]
            - apiGroups: ["apps"]
              resources: ["statefulsets", "deployments"]
              verbs: ["*"]
          ---
          apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRoleBinding
          metadata:
            name: stellar-operator
          roleRef:
            apiGroup: rbac.authorization.k8s.io
            kind: ClusterRole
            name: stellar-operator
          subjects:
            - kind: ServiceAccount
              name: stellar-operator
              namespace: stellar-system
          ---
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: stellar-operator
            namespace: stellar-system
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: stellar-operator
            template:
              metadata:
                labels:
                  app: stellar-operator
              spec:
                serviceAccountName: stellar-operator
                containers:
                  - name: operator
                    image: stellar-operator:${{ needs.build.outputs.version }}
                    imagePullPolicy: Never
                    ports:
                      - containerPort: 8080
                        name: http
                      - containerPort: 9090
                        name: metrics
                    env:
                      - name: RUST_LOG
                        value: info
                    resources:
                      requests:
                        cpu: 500m
                        memory: 512Mi
                      limits:
                        cpu: 2000m
                        memory: 2Gi
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: stellar-operator
            namespace: stellar-system
          spec:
            type: NodePort
            selector:
              app: stellar-operator
            ports:
              - name: http
                port: 8080
                targetPort: 8080
                nodePort: 30080
              - name: metrics
                port: 9090
                targetPort: 9090
          EOF

          kubectl apply -f operator-deployment.yaml

      - name: Wait for operator
        run: |
          kubectl wait --for=condition=available deployment/stellar-operator \
            -n stellar-system --timeout=180s || true

          sleep 10

      - name: Verify operator
        continue-on-error: true
        run: |
          # Check operator logs
          kubectl logs -n stellar-system -l app=stellar-operator --tail=50 || true

          # Verify operator is responding
          kubectl port-forward -n stellar-system svc/stellar-operator 8080:8080 &
          sleep 5

          if curl -sf http://localhost:8080/healthz 2>/dev/null; then
            echo "✅ Operator is ready"
          else
            echo "⚠️ Operator health check failed, continuing with tests"
          fi

      - name: Determine baseline
        id: baseline
        run: |
          BASELINE_VERSION="${{ github.event.inputs.baseline_version || 'v0.1.0' }}"
          BASELINE_FILE="benchmarks/baselines/${BASELINE_VERSION}.json"

          if [[ -f "$BASELINE_FILE" ]]; then
            echo "baseline_file=$BASELINE_FILE" >> $GITHUB_OUTPUT
            echo "has_baseline=true" >> $GITHUB_OUTPUT
            echo "✅ Using baseline: $BASELINE_FILE"
          else
            echo "has_baseline=false" >> $GITHUB_OUTPUT
            echo "⚠️ No baseline found, will run without comparison"
          fi

      - name: Run operator benchmarks
        id: operator_bench
        run: |
          mkdir -p results

          export KUBECONFIG=$(pwd)/kubeconfig.yaml

          k6 run \
            --env BASE_URL=http://localhost:8080 \
            --env K8S_API_URL=http://localhost:8001 \
            --env NAMESPACE=stellar-benchmark \
            --env RUN_ID=${{ github.run_id }} \
            --env VERSION=${{ needs.build.outputs.version }} \
            --env GIT_SHA=${{ github.sha }} \
            --env BASELINE_FILE=${{ steps.baseline.outputs.baseline_file }} \
            --out json=results/operator-benchmark-raw.json \
            benchmarks/k6/operator-load-test.js
        continue-on-error: true

      - name: Collect operator logs
        if: always()
        run: |
          export KUBECONFIG=$(pwd)/kubeconfig.yaml
          kubectl logs -n stellar-system -l app=stellar-operator --tail=1000 > results/operator-logs.txt || true
          kubectl get events -n stellar-benchmark --sort-by='.lastTimestamp' > results/events.txt || true
          kubectl get pods -n stellar-benchmark -o wide > results/pods.txt || true

      - name: Upload benchmark results
        uses: actions/upload-artifact@v7
        with:
          name: performance-results-${{ needs.build.outputs.version }}
          path: results/
          retention-days: 30

  # ==========================================================================
  # Regression Analysis
  # ==========================================================================
  regression-analysis:
    name: Regression Analysis
    runs-on: ubuntu-latest
    needs: [build, performance-test]
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Download benchmark results
        uses: actions/download-artifact@v8
        with:
          name: performance-results-${{ needs.build.outputs.version }}
          path: results/

      - name: Determine baseline
        id: baseline
        run: |
          BASELINE_VERSION="${{ github.event.inputs.baseline_version || 'v0.1.0' }}"
          BASELINE_FILE="benchmarks/baselines/${BASELINE_VERSION}.json"

          if [[ -f "$BASELINE_FILE" ]]; then
            echo "baseline_file=$BASELINE_FILE" >> $GITHUB_OUTPUT
            echo "has_baseline=true" >> $GITHUB_OUTPUT
          else
            echo "has_baseline=false" >> $GITHUB_OUTPUT
          fi

      - name: Compare with baseline
        if: steps.baseline.outputs.has_baseline == 'true'
        id: compare
        run: |
          THRESHOLD="${{ github.event.inputs.regression_threshold || '10' }}"

          python benchmarks/scripts/compare_benchmarks.py compare \
            --current results/benchmark-summary.json \
            --baseline ${{ steps.baseline.outputs.baseline_file }} \
            --threshold $THRESHOLD \
            --output results/regression-report.json \
            --verbose
        continue-on-error: true

      - name: Generate performance report
        id: report
        run: |
          cat > pr-comment.md <<'COMMENT_EOF'
          ## 📊 Performance Regression Test Results

          **PR:** #${{ github.event.pull_request.number }}
          **Version:** ${{ needs.build.outputs.version }}
          **Commit:** ${{ github.sha }}
          **Baseline:** ${{ github.event.inputs.baseline_version || 'v0.1.0' }}
          **Threshold:** ${{ github.event.inputs.regression_threshold || '10' }}%

          COMMENT_EOF

          if [[ -f results/benchmark-summary.json ]]; then
            TPS=$(jq -r '.metrics.tps.avg // "N/A"' results/benchmark-summary.json)
            HTTP_P95=$(jq -r '.metrics.http_req_duration.p95 // "N/A"' results/benchmark-summary.json)
            HTTP_P99=$(jq -r '.metrics.http_req_duration.p99 // "N/A"' results/benchmark-summary.json)
            RECON_P95=$(jq -r '.metrics.reconciliation_duration.p95 // "N/A"' results/benchmark-summary.json)
            RECON_P99=$(jq -r '.metrics.reconciliation_duration.p99 // "N/A"' results/benchmark-summary.json)
            API_P95=$(jq -r '.metrics.api_latency.p95 // "N/A"' results/benchmark-summary.json)
            ERROR_RATE=$(jq -r '.metrics.error_rate // "N/A"' results/benchmark-summary.json)
            TOTAL_REQUESTS=$(jq -r '.metrics.total_requests // "N/A"' results/benchmark-summary.json)

            cat >> pr-comment.md <<EOF
          ### 🎯 Key Performance Metrics

          | Metric | Value | Threshold |
          |--------|-------|-----------|
          | **TPS (avg)** | ${TPS} req/s | > 100 req/s |
          | **HTTP Latency (p95)** | ${HTTP_P95} ms | < 500 ms |
          | **HTTP Latency (p99)** | ${HTTP_P99} ms | < 1000 ms |
          | **Reconciliation (p95)** | ${RECON_P95} ms | < 3000 ms |
          | **Reconciliation (p99)** | ${RECON_P99} ms | < 5000 ms |
          | **API Latency (p95)** | ${API_P95} ms | < 200 ms |
          | **Error Rate** | ${ERROR_RATE} | < 0.01 |
          | **Total Requests** | ${TOTAL_REQUESTS} | - |

          EOF
          fi

          if [[ -f results/regression-report.json ]]; then
            OVERALL_PASSED=$(jq -r '.overall_passed' results/regression-report.json)
            SUMMARY=$(jq -r '.summary' results/regression-report.json)
            NUM_REGRESSIONS=$(jq -r '.regressions | length' results/regression-report.json)
            NUM_IMPROVEMENTS=$(jq -r '.improvements | length' results/regression-report.json)
            NUM_STABLE=$(jq -r '.stable | length' results/regression-report.json)

            if [[ "$OVERALL_PASSED" == "true" ]]; then
              cat >> pr-comment.md <<EOF
          ### ✅ Regression Check: PASSED

          ${SUMMARY}

          - 🟢 Improvements: ${NUM_IMPROVEMENTS}
          - ⚪ Stable: ${NUM_STABLE}
          - 🔴 Regressions: ${NUM_REGRESSIONS}

          EOF
            else
              cat >> pr-comment.md <<EOF
          ### ❌ Regression Check: FAILED

          ${SUMMARY}

          - 🟢 Improvements: ${NUM_IMPROVEMENTS}
          - ⚪ Stable: ${NUM_STABLE}
          - 🔴 Regressions: ${NUM_REGRESSIONS}

          <details>
          <summary>📉 View Regression Details</summary>

          \`\`\`json
          $(jq '.regressions' results/regression-report.json)
          \`\`\`

          </details>

          EOF
            fi

            if [[ ${NUM_IMPROVEMENTS} -gt 0 ]]; then
              cat >> pr-comment.md <<EOF
          <details>
          <summary>📈 View Improvements</summary>

          \`\`\`json
          $(jq '.improvements' results/regression-report.json)
          \`\`\`

          </details>

          EOF
            fi
          else
            cat >> pr-comment.md <<EOF
          ### ℹ️ No Baseline Comparison

          No baseline found for comparison. This is the first benchmark run.

          EOF
          fi

          cat >> pr-comment.md <<EOF
          ---

          <details>
          <summary>📋 View Full Results</summary>

          \`\`\`json
          $(cat results/benchmark-summary.json 2>/dev/null || echo "{}")
          \`\`\`

          </details>

          ---
          *Performance tests run on kind cluster with GitHub Actions*
          *Run ID: ${{ github.run_id }}*
          EOF

          echo "Report generated successfully"

      - name: Post PR comment
        if: github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@v5
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body-path: pr-comment.md
          edit-mode: replace

      - name: Create job summary
        if: always()
        run: |
          if [[ -f pr-comment.md ]]; then
            cat pr-comment.md >> $GITHUB_STEP_SUMMARY
          fi

      - name: Check regression status
        if: steps.compare.outcome == 'failure'
        run: |
          if [[ -f results/regression-report.json ]]; then
            OVERALL_PASSED=$(jq -r '.overall_passed' results/regression-report.json)
            if [[ "$OVERALL_PASSED" == "false" ]]; then
              echo "::warning::Performance regression detected! Review the benchmark results."
              # Don't fail on first run or if no baseline exists
              if [[ -f ${{ steps.baseline.outputs.baseline_file }} ]]; then
                exit 1
              fi
            fi
          fi

  # ==========================================================================
  # Cleanup
  # ==========================================================================
  cleanup:
    name: Cleanup
    runs-on: ubuntu-latest
    needs: [build, performance-test, regression-analysis]
    if: always()
    steps:
      - name: Install kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/${{ env.KIND_VERSION }}/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Delete kind cluster
        run: |
          kind delete cluster --name benchmark || true

      - name: Cleanup artifacts
        run: |
          echo "Cleanup completed"
