suite: secret and externalsecret
templates:
  - templates/secret.yaml
  - templates/externalsecret.yaml

tests:
  # --- secret.yaml ---
  - it: does not render Secret by default (secrets.create false)
    template: templates/secret.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: renders Secret when secrets.create true and useExternalSecrets false
    template: templates/secret.yaml
    set:
      secrets.create: true
      secrets.useExternalSecrets: false
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: RELEASE-NAME-stellar-operator-secrets
      - equal:
          path: type
          value: Opaque

  - it: Secret has common labels
    template: templates/secret.yaml
    set:
      secrets.create: true
      secrets.useExternalSecrets: false
    asserts:
      - isSubset:
          path: metadata.labels
          content:
            app.kubernetes.io/name: stellar-operator
            app.kubernetes.io/instance: RELEASE-NAME

  - it: does not render Secret when useExternalSecrets is true
    template: templates/secret.yaml
    set:
      secrets.create: true
      secrets.useExternalSecrets: true
    asserts:
      - hasDocuments:
          count: 0

  - it: Secret encodes items as base64
    template: templates/secret.yaml
    set:
      secrets.create: true
      secrets.useExternalSecrets: false
      secrets.items:
        validator-seed:
          key: STELLAR_CORE_SEED
          value: myseedvalue
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: data.STELLAR_CORE_SEED
          value: bXlzZWVkdmFsdWU=

  # --- externalsecret.yaml ---
  - it: does not render ExternalSecret by default
    template: templates/externalsecret.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: does not render ExternalSecret when create true but useExternalSecrets false
    template: templates/externalsecret.yaml
    set:
      secrets.create: true
      secrets.useExternalSecrets: false
    asserts:
      - hasDocuments:
          count: 0

  - it: renders ExternalSecret when both flags are true
    template: templates/externalsecret.yaml
    set:
      secrets.create: true
      secrets.useExternalSecrets: true
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ExternalSecret
      - equal:
          path: metadata.name
          value: RELEASE-NAME-stellar-operator-secrets

  - it: ExternalSecret uses configured secretStoreRef
    template: templates/externalsecret.yaml
    set:
      secrets.create: true
      secrets.useExternalSecrets: true
      secrets.externalSecret.secretStoreRef.name: my-vault-store
      secrets.externalSecret.secretStoreRef.kind: SecretStore
    asserts:
      - equal:
          path: spec.secretStoreRef.name
          value: my-vault-store
      - equal:
          path: spec.secretStoreRef.kind
          value: SecretStore

  - it: ExternalSecret uses configured refreshInterval
    template: templates/externalsecret.yaml
    set:
      secrets.create: true
      secrets.useExternalSecrets: true
      secrets.externalSecret.refreshInterval: "30m"
    asserts:
      - equal:
          path: spec.refreshInterval
          value: "30m"

  - it: ExternalSecret target name matches release name
    template: templates/externalsecret.yaml
    set:
      secrets.create: true
      secrets.useExternalSecrets: true
    asserts:
      - equal:
          path: spec.target.name
          value: RELEASE-NAME-stellar-operator-secrets
