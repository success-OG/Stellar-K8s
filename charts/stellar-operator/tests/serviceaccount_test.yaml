suite: serviceaccount
templates:
  - templates/serviceaccount.yaml

tests:
  - it: renders ServiceAccount by default
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.name
          value: RELEASE-NAME-stellar-operator

  - it: does not render when serviceAccount.create is false
    set:
      serviceAccount.create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: uses custom name when serviceAccount.name is set
    set:
      serviceAccount.name: my-sa
    asserts:
      - equal:
          path: metadata.name
          value: my-sa

  - it: uses fullnameOverride as SA name when serviceAccount.name is empty
    set:
      fullnameOverride: my-operator
    asserts:
      - equal:
          path: metadata.name
          value: my-operator

  - it: has no annotations by default
    asserts:
      - isNull:
          path: metadata.annotations

  - it: applies serviceAccount annotations
    set:
      serviceAccount.annotations:
        eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/stellar-operator
    asserts:
      - equal:
          path: metadata.annotations["eks.amazonaws.com/role-arn"]
          value: arn:aws:iam::123456789012:role/stellar-operator

  - it: applies multiple serviceAccount annotations
    set:
      serviceAccount.annotations:
        eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/stellar-operator
        iam.gke.io/gcp-service-account: stellar@project.iam.gserviceaccount.com
    asserts:
      - equal:
          path: metadata.annotations["eks.amazonaws.com/role-arn"]
          value: arn:aws:iam::123456789012:role/stellar-operator
      - equal:
          path: metadata.annotations["iam.gke.io/gcp-service-account"]
          value: stellar@project.iam.gserviceaccount.com

  - it: has common labels
    asserts:
      - isSubset:
          path: metadata.labels
          content:
            app.kubernetes.io/name: stellar-operator
            app.kubernetes.io/instance: RELEASE-NAME
