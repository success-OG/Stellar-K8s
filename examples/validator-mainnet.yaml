# validator-mainnet.yaml
# Comprehensive example of a Stellar Core Validator node for Mainnet.
# This configuration is optimized for production use with persistent storage and archives.

apiVersion: stellar.org/v1alpha1
kind: StellarNode
metadata:
  name: validator-mainnet
  namespace: stellar
spec:
  # The type of node to deploy. 'Validator' runs stellar-core.
  nodeType: Validator

  # The target Stellar network. 'Mainnet' uses the public network passphrase.
  network: Mainnet

  # The container version (image tag) to use for stellar-core.
  version: "v21.0.0"

  # Resource requests and limits for the validator pod.
  # Adjust based on your infrastructure and expected load.
  resources:
    requests:
      cpu: "1"
      memory: "2Gi"
    limits:
      cpu: "2"
      memory: "4Gi"

  # Data disk configuration.
  storage:
    # 'PersistentVolume' is recommended for production.
    mode: PersistentVolume
    # Storage class name (e.g., 'gp3' on AWS, 'premium-rwo' on GCP).
    storageClass: "ssd-premium"
    # Size should be large enough to hold the ledger database (Mainnet is ~400GB+).
    size: "500Gi"
    # 'Retain' prevents the PVC from being deleted when the StellarNode resource is removed.
    retentionPolicy: Retain

  # Validator-specific settings.
  validatorConfig:
    # Name of a K8s Secret containing the 'STELLAR_CORE_SEED' key.
    seedSecretRef: "validator-seed-mainnet"
    
    # Whether to enable history archive publishing/fetching.
    enableHistoryArchive: true
    
    # List of history archive URLs to fetch from (SDF archives are common for Mainnet).
    historyArchiveUrls:
      - "https://history.stellar.org/prd/core-live/core_live_001"
      - "https://history.stellar.org/prd/core-live/core_live_002"
    
    # Quorum set configuration in TOML format.
    # Defines which nodes this validator trusts to achieve consensus.
    quorumSet: |
      [QUORUM_SET]
      THRESHOLD_PERCENT=67
      VALIDATORS=[
        "$sdf1", "$sdf2", "$sdf3",
        "$tieron_1", "$tieron_2", "$tieron_3"
      ]

  # Enables Prometheus metrics collection and alerting hooks.
  alerting: true

  # Default pod anti-affinity ensures this node is not scheduled on the same 
  # physical host as another node of the same type/network.
  podAntiAffinity: Hard
