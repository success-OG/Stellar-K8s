apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: requiredlabels
spec:
  crd:
    spec:
      names:
        kind: RequiredLabels
      validation:
        openAPIV3Schema:
          type: object
          properties:
            required_labels:
              type: array
              items:
                type: string
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package requiredlabels

        violation[{"msg": msg}] {
          count(input.parameters.required_labels) > 0
          name := input.review.object.metadata.name
          labels := input.review.object.metadata.labels
          missing := [label | label := input.parameters.required_labels[_]; not labels[label]]
          count(missing) > 0
          msg := sprintf("StellarNode '%s' is missing required labels: %v", [name, missing])
        }
