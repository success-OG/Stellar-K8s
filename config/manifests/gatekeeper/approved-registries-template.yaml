apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: approvedregistries
spec:
  crd:
    spec:
      names:
        kind: ApprovedRegistries
      validation:
        openAPIV3Schema:
          type: object
          properties:
            allowed_registries:
              type: array
              items:
                type: string
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package approvedregistries

        violation[{"msg": msg}] {
          count(input.parameters.allowed_registries) == 0
          name := input.review.object.metadata.name
          msg := sprintf("StellarNode '%s' image registry '%s' is not in the approved list: %v", [name, input.review.object.spec.version, input.parameters.allowed_registries])
        }

        violation[{"msg": msg}] {
          count(input.parameters.allowed_registries) > 0
          version := input.review.object.spec.version
          name := input.review.object.metadata.name
          not any_registry_matches(version, input.parameters.allowed_registries)
          msg := sprintf("StellarNode '%s' image registry '%s' is not in the approved list: %v", [name, version, input.parameters.allowed_registries])
        }

        any_registry_matches(version, registries) {
          registry := registries[_]
          startswith(version, registry)
        }
