                      requests:
                        description: Resource specification for CPU and memory
                        properties:
                          cpu:
                            type: string
                          memory:
                            type: string
                        required:
                        - cpu
                        - memory
                        type: object
                    required:
                    - limits
                    - requests
                    type: object
                  strategy:
                    default: RoundRobin
                    description: Load balancing strategy
                    enum:
