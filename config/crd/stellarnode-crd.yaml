apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: stellarnodes.stellar.org
  labels:
    app.kubernetes.io/name: stellar-operator
    app.kubernetes.io/instance: stellar-operator
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/managed-by: helm
spec:
  group: stellar.org
  names:
    kind: StellarNode
    listKind: StellarNodeList
    plural: stellarnodes
    singular: stellarnode
    shortNames:
      - sn
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - nodeType
                - network
                - version
              properties:
                nodeType:
                  type: string
                  enum: [Validator, Horizon, SorobanRpc]
                  description: Type of Stellar node to deploy
                network:
                  type: string
                  description: Target Stellar network
                version:
                  type: string
                  description: Container image version
                replicas:
                  type: integer
                  minimum: 0
                  default: 1
                  description: Number of replicas (RPC nodes only)
                suspended:
                  type: boolean
                  default: false
                  description: Suspend the node without deleting resources
                podAntiAffinity:
                  type: string
                  enum: [Hard, Soft, Disabled]
                  default: Hard
                  description: >
                    Controls default pod anti-affinity for pods sharing the same stellar-network label.
                    Hard uses requiredDuringScheduling; Soft uses preferredDuringScheduling; Disabled skips pod anti-affinity.
                resources:
                  type: object
                  properties:
                    requests:
                      type: object
                      properties:
                        cpu:
                          type: string
                        memory:
                          type: string
                    limits:
                      type: object
                      properties:
                        cpu:
                          type: string
                        memory:
                          type: string
                storage:
                  type: object
                  properties:
                    storageClass:
                      type: string
                    size:
                      type: string
                    retentionPolicy:
                      type: string
                      enum: [Delete, Retain]
                      default: Delete
                    annotations:
                      type: object
                      additionalProperties:
                        type: string
                      description: Optional annotations to apply to the PersistentVolumeClaim (useful for storage-class specific parameters like volumeBindingMode)
                      nullable: true
                validatorConfig:
                  type: object
                  properties:
                    seedSecretRef:
                      type: string
                    quorumSet:
                      type: string
                    enableHistoryArchive:
                      type: boolean
                    historyArchiveUrls:
                      type: array
                      items:
                        type: string
                    catchupComplete:
                      type: boolean
                    seedSecretSource:
                      type: object
                      description: Typed seed source; exactly one of localRef, externalRef, csiRef, vaultRef.
                      properties:
                        localRef:
                          type: object
                          x-kubernetes-preserve-unknown-fields: true
                        externalRef:
                          type: object
                          x-kubernetes-preserve-unknown-fields: true
                        csiRef:
                          type: object
                          x-kubernetes-preserve-unknown-fields: true
                        vaultRef:
                          type: object
                          properties:
                            role:
                              type: string
                            secretPath:
                              type: string
                            secretKey:
                              type: string
                              nullable: true
                            secretFileName:
                              type: string
                              nullable: true
                            template:
                              type: string
                              nullable: true
                            restartOnSecretRotation:
                              type: boolean
                            extraPodAnnotations:
                              type: array
                              items:
                                type: object
                                properties:
                                  name:
                                    type: string
                                  value:
                                    type: string
                horizonConfig:
                  type: object
                  properties:
                    databaseSecretRef:
                      type: string
                    enableIngest:
                      type: boolean
                    stellarCoreUrl:
                      type: string
                    ingestWorkers:
                      type: integer
                    enableExperimentalIngestion:
                      type: boolean
                sorobanConfig:
                  type: object
                  properties:
                    stellarCoreUrl:
                      type: string
                    captiveCoreConfig:
                      type: string
                    enablePreflight:
                      type: boolean
                    maxEventsPerRequest:
                      type: integer
                serviceConfig:
                  type: object
                  properties:
                    peerNodePort:
                      type: integer
                      minimum: 30000
                      maximum: 32767
                      description: NodePort for peer connections (validators only)
                    httpNodePort:
                      type: integer
                      minimum: 30000
                      maximum: 32767
                      description: NodePort for HTTP API access
                snapshotSchedule:
                  type: object
                  description: Schedule and options for CSI VolumeSnapshots of the node data PVC (Validator only).
                  properties:
                    schedule:
                      type: string
                      description: Cron expression for scheduled snapshots (e.g. "0 2 * * *" for daily at 2 AM). If unset, snapshots only on annotation stellar.org/request-snapshot=true.
                    volumeSnapshotClassName:
                      type: string
                      description: VolumeSnapshotClass name. If unset, default class for the driver is used.
                    flushBeforeSnapshot:
                      type: boolean
                      default: false
                      description: If true, attempt to flush/lock the Stellar DB briefly before creating the snapshot.
                    retentionCount:
                      type: integer
                      format: int32
                      default: 0
                      description: Max snapshots to retain per node. 0 means no limit.
                restoreFromSnapshot:
                  type: object
                  description: Bootstrap this node from an existing VolumeSnapshot (Validator only). PVC is created from the snapshot.
                  properties:
                    volumeSnapshotName:
                      type: string
                      description: Name of the VolumeSnapshot to restore from (same namespace as StellarNode).
                    namespace:
                      type: string
                      description: Optional namespace of the VolumeSnapshot (CrossNamespaceVolumeDataSource).
            status:
              type: object
              properties:
                phase:
                  type: string
                message:
                  type: string
                observedGeneration:
                  type: integer
                  format: int64
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      lastTransitionTime:
                        type: string
                      reason:
                        type: string
                      message:
                        type: string
                ledgerSequence:
                  type: integer
                  format: int64
                endpoint:
                  type: string
                readyReplicas:
                  type: integer
                replicas:
                  type: integer
                vaultObservedSecretVersion:
                  type: string
                  description: Last Vault secret version observed for rotation-driven rollouts.
                forensicSnapshotPhase:
                  type: string
                  description: Phase of forensic snapshot (Capturing, Complete, Failed).
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Type
          type: string
          jsonPath: .spec.nodeType
        - name: Network
          type: string
          jsonPath: .spec.network
        - name: Replicas
          type: integer
          jsonPath: .spec.replicas
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
