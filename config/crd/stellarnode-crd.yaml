                  enabled:
                    default: false
                    description: 'Whether the OCI snapshot feature is enabled (default: false)'
                    type: boolean
                  fixedTag:
                    description: Fixed tag to use when `tag_strategy` is `Fixed` (e.g. `latest`)
                    nullable: true
                    type: string
