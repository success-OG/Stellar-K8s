<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stellar-K8s Operator Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .subtitle {
            opacity: 0.9;
            font-size: 1.1em;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #1e293b;
            padding: 25px;
            border-radius: 12px;
            border: 1px solid #334155;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        }

        .stat-label {
            font-size: 0.9em;
            color: #94a3b8;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 2.5em;
            font-weight: bold;
            color: #fff;
        }

        .stat-healthy { color: #10b981; }
        .stat-syncing { color: #f59e0b; }
        .stat-unhealthy { color: #ef4444; }

        .nodes-section {
            background: #1e293b;
            padding: 30px;
            border-radius: 12px;
            border: 1px solid #334155;
            margin-bottom: 30px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 1.8em;
            font-weight: 600;
        }

        .refresh-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            transition: background 0.2s;
        }

        .refresh-btn:hover {
            background: #5568d3;
        }

        .nodes-table {
            width: 100%;
            border-collapse: collapse;
        }

        .nodes-table th {
            background: #0f172a;
            padding: 15px;
            text-align: left;
            font-weight: 600;
            border-bottom: 2px solid #334155;
        }

        .nodes-table td {
            padding: 15px;
            border-bottom: 1px solid #334155;
        }

        .nodes-table tr:hover {
            background: #0f172a;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.85em;
            font-weight: 600;
        }

        .badge-success { background: #10b981; color: white; }
        .badge-warning { background: #f59e0b; color: white; }
        .badge-error { background: #ef4444; color: white; }
        .badge-info { background: #3b82f6; color: white; }

        .action-btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9em;
            margin-right: 5px;
            transition: background 0.2s;
        }

        .action-btn:hover {
            background: #2563eb;
        }

        .action-btn-danger {
            background: #ef4444;
        }

        .action-btn-danger:hover {
            background: #dc2626;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
        }

        .modal-content {
            background: #1e293b;
            margin: 50px auto;
            padding: 30px;
            border-radius: 12px;
            max-width: 800px;
            max-height: 80vh;
            overflow-y: auto;
            border: 1px solid #334155;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .close-btn {
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 2em;
            cursor: pointer;
            line-height: 1;
        }

        .close-btn:hover {
            color: #fff;
        }

        .logs-container {
            background: #0f172a;
            padding: 20px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
            white-space: pre-wrap;
            max-height: 500px;
            overflow-y: auto;
        }

        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1.2em;
            color: #94a3b8;
        }

        .error-message {
            background: #7f1d1d;
            color: #fecaca;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
        }

        .conditions-list {
            list-style: none;
        }

        .condition-item {
            background: #0f172a;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            border-left: 4px solid #334155;
        }

        .condition-item.success { border-left-color: #10b981; }
        .condition-item.warning { border-left-color: #f59e0b; }
        .condition-item.error { border-left-color: #ef4444; }

        .condition-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .condition-type {
            font-weight: 600;
            font-size: 1.1em;
        }

        .condition-message {
            color: #94a3b8;
            font-size: 0.9em;
        }

        /* Search UI Styles */
        .search-container {
            margin-bottom: 30px;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 15px 20px;
            border-radius: 12px;
            background: #1e293b;
            border: 1px solid #334155;
            color: #fff;
            font-size: 1.1em;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .search-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.3);
        }

        .search-results {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #1e293b;
            border-radius: 0 0 12px 12px;
            border: 1px solid #334155;
            border-top: none;
            z-index: 1001;
            max-height: 400px;
            overflow-y: auto;
            display: none;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .search-result-item {
            padding: 15px 20px;
            border-bottom: 1px solid #334155;
            cursor: pointer;
            transition: background 0.2s;
        }

        .search-result-item:last-child {
            border-bottom: none;
        }

        .search-result-item:hover {
            background: #334155;
        }

        .result-title {
            font-weight: 600;
            color: #667eea;
            margin-bottom: 5px;
        }

        .result-snippet {
            font-size: 0.9em;
            color: #94a3b8;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .highlight {
            background: rgba(245, 158, 11, 0.3);
            color: #fbbf24;
            padding: 2px 4px;
            border-radius: 4px;
            font-weight: 600;
        }

        /* Documentation Modal Styles */
        .doc-content {
            padding: 20px;
            color: #e2e8f0;
            font-size: 1.1em;
            line-height: 1.7;
        }

        .doc-content h1, .doc-content h2, .doc-content h3 {
            margin: 25px 0 15px 0;
            color: #fff;
        }

        .doc-content code {
            background: #0f172a;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            color: #ec4899;
        }

        .doc-content pre {
            background: #0f172a;
            padding: 20px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 20px 0;
        }

        .doc-content pre code {
            background: none;
            padding: 0;
            color: #e2e8f0;
        }
    </style>
    <!-- Include Lunr.js and Marked for documentation portal -->
    <script src="https://cdn.jsdelivr.net/npm/lunr@2.3.9/lunr.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>⭐ Stellar-K8s Operator Dashboard</h1>
            <div class="subtitle">Real-time monitoring and management of Stellar nodes</div>
        </header>

        <div class="search-container">
            <input type="text" id="searchInput" class="search-input" placeholder="Search documentation (e.g., 'mTLS rotation', 'S3 backup config')..." autocomplete="off">
            <div id="searchResults" class="search-results"></div>
        </div>

        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="stat-label">Total Nodes</div>
                <div class="stat-value" id="totalNodes">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Healthy</div>
                <div class="stat-value stat-healthy" id="healthyNodes">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Syncing</div>
                <div class="stat-value stat-syncing" id="syncingNodes">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Unhealthy</div>
                <div class="stat-value stat-unhealthy" id="unhealthyNodes">-</div>
            </div>
        </div>

        <div class="nodes-section">
            <div class="section-header">
                <h2 class="section-title">Managed Nodes</h2>
                <button class="refresh-btn" onclick="loadDashboard()">🔄 Refresh</button>
            </div>
            <div id="nodesContent">
                <div class="loading">Loading nodes...</div>
            </div>
        </div>
    </div>

    <!-- Logs Modal -->
    <div id="logsModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="logsTitle">Node Logs</h2>
                <button class="close-btn" onclick="closeModal('logsModal')">&times;</button>
            </div>
            <div class="logs-container" id="logsContent">Loading...</div>
        </div>
    </div>

    <!-- Conditions Modal -->
    <div id="conditionsModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="conditionsTitle">Node Conditions</h2>
                <button class="close-btn" onclick="closeModal('conditionsModal')">&times;</button>
            </div>
            <ul class="conditions-list" id="conditionsContent"></ul>
        </div>
    </div>

    <!-- Documentation Modal -->
    <div id="docModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="docTitle">Documentation</h2>
                <button class="close-btn" onclick="closeModal('docModal')">&times;</button>
            </div>
            <div id="docContent" class="doc-content"></div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;
        let searchIndex = null;
        let docData = [];

        // Initialize documentation search
        async function initSearch() {
            try {
                const response = await fetch(`${API_BASE}/api/v1/docs/search-index`);
                docData = await response.json();
                
                searchIndex = lunr(function () {
                    this.ref('path');
                    this.field('title', { boost: 10 });
                    this.field('content');

                    docData.forEach(function (doc) {
                        this.add(doc);
                    }, this);
                });

                console.log('Search index initialized with', docData.length, 'documents');
            } catch (error) {
                console.error('Failed to initialize search:', error);
            }
        }

        const searchInput = document.getElementById('searchInput');
        const searchResults = document.getElementById('searchResults');

        searchInput.addEventListener('input', (e) => {
            const query = e.target.value;
            if (query.length < 2) {
                searchResults.style.display = 'none';
                return;
            }

            if (!searchIndex) return;

            const results = searchIndex.search(query);
            renderSearchResults(results, query);
        });

        function renderSearchResults(results, query) {
            if (results.length === 0) {
                searchResults.innerHTML = '<div class="search-result-item">No results found</div>';
                searchResults.style.display = 'block';
                return;
            }

            const html = results.slice(0, 10).map(result => {
                const doc = docData.find(d => d.path === result.ref);
                const snippet = getSnippet(doc.content, query);
                return `
                    <div class="search-result-item" onclick="showDoc('${doc.path}')">
                        <div class="result-title">${highlight(doc.title, query)}</div>
                        <div class="result-snippet">${highlight(snippet, query)}</div>
                    </div>
                `;
            }).join('');

            searchResults.innerHTML = html;
            searchResults.style.display = 'block';
        }

        function getSnippet(content, query) {
            const index = content.toLowerCase().indexOf(query.toLowerCase());
            if (index === -1) return content.substring(0, 100) + '...';
            
            const start = Math.max(0, index - 40);
            const end = Math.min(content.length, index + query.length + 60);
            return (start > 0 ? '...' : '') + content.substring(start, end) + (end < content.length ? '...' : '');
        }

        function highlight(text, query) {
            const regex = new RegExp(`(${query})`, 'gi');
            return text.replace(regex, '<span class="highlight">$1</span>');
        }

        function showDoc(path) {
            const doc = docData.find(d => d.path === path);
            if (!doc) return;

            searchResults.style.display = 'none';
            searchInput.value = '';

            document.getElementById('docModal').style.display = 'block';
            document.getElementById('docTitle').textContent = doc.title;
            document.getElementById('docContent').innerHTML = marked.parse(doc.content);
        }

        // Close search results when clicking outside
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.search-container')) {
                searchResults.style.display = 'none';
            }
        });

        async function loadDashboard() {
            try {
                // Load overview stats
                const overview = await fetch(`${API_BASE}/api/v1/dashboard/overview`).then(r => r.json());
                document.getElementById('totalNodes').textContent = overview.totalNodes;
                document.getElementById('healthyNodes').textContent = overview.healthyNodes;
                document.getElementById('syncingNodes').textContent = overview.syncingNodes;
                document.getElementById('unhealthyNodes').textContent = overview.unhealthyNodes;

                // Load nodes list
                const nodes = await fetch(`${API_BASE}/api/v1/nodes`).then(r => r.json());
                renderNodesTable(nodes.items);
            } catch (error) {
                console.error('Failed to load dashboard:', error);
                document.getElementById('nodesContent').innerHTML =
                    `<div class="error-message">Failed to load dashboard: ${error.message}</div>`;
            }
        }

        function renderNodesTable(nodes) {
            if (nodes.length === 0) {
                document.getElementById('nodesContent').innerHTML =
                    '<div class="loading">No nodes found</div>';
                return;
            }

            const table = `
                <table class="nodes-table">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Namespace</th>
                            <th>Type</th>
                            <th>Network</th>
                            <th>Status</th>
                            <th>Replicas</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${nodes.map(node => `
                            <tr>
                                <td><strong>${node.name}</strong></td>
                                <td>${node.namespace}</td>
                                <td><span class="badge badge-info">${node.nodeType}</span></td>
                                <td>${node.network}</td>
                                <td>${getStatusBadge(node.phase)}</td>
                                <td>${node.readyReplicas}/${node.replicas}</td>
                                <td>
                                    <button class="action-btn" onclick="showLogs('${node.namespace}', '${node.name}')">📋 Logs</button>
                                    <button class="action-btn" onclick="showConditions('${node.namespace}', '${node.name}')">📊 Status</button>
                                    <button class="action-btn" onclick="executeAction('${node.namespace}', '${node.name}', 'snapshot')">📸 Snapshot</button>
                                    <button class="action-btn action-btn-danger" onclick="executeAction('${node.namespace}', '${node.name}', 'restart')">🔄 Restart</button>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
            document.getElementById('nodesContent').innerHTML = table;
        }

        function getStatusBadge(phase) {
            const badges = {
                'Ready': '<span class="badge badge-success">Ready</span>',
                'Syncing': '<span class="badge badge-warning">Syncing</span>',
                'Creating': '<span class="badge badge-info">Creating</span>',
                'Failed': '<span class="badge badge-error">Failed</span>',
                'Unknown': '<span class="badge badge-warning">Unknown</span>'
            };
            return badges[phase] || `<span class="badge badge-info">${phase}</span>`;
        }

        async function showLogs(namespace, name) {
            document.getElementById('logsModal').style.display = 'block';
            document.getElementById('logsTitle').textContent = `Logs: ${namespace}/${name}`;
            document.getElementById('logsContent').textContent = 'Loading logs...';

            try {
                const logs = await fetch(`${API_BASE}/api/v1/dashboard/nodes/${namespace}/${name}/logs`).then(r => r.json());
                document.getElementById('logsContent').textContent = logs.logs || 'No logs available';
            } catch (error) {
                document.getElementById('logsContent').textContent = `Error loading logs: ${error.message}`;
            }
        }

        async function showConditions(namespace, name) {
            document.getElementById('conditionsModal').style.display = 'block';
            document.getElementById('conditionsTitle').textContent = `Conditions: ${namespace}/${name}`;
            document.getElementById('conditionsContent').innerHTML = '<div class="loading">Loading...</div>';

            try {
                const data = await fetch(`${API_BASE}/api/v1/dashboard/nodes/${namespace}/${name}/conditions`).then(r => r.json());
                const html = data.conditions.map(c => `
                    <li class="condition-item ${c.severity}">
                        <div class="condition-header">
                            <span class="condition-type">${c.conditionType}</span>
                            <span class="badge badge-${c.severity}">${c.status}</span>
                        </div>
                        ${c.message ? `<div class="condition-message">${c.message}</div>` : ''}
                        ${c.lastTransitionTime ? `<div class="condition-message">Last updated: ${new Date(c.lastTransitionTime).toLocaleString()}</div>` : ''}
                    </li>
                `).join('');
                document.getElementById('conditionsContent').innerHTML = html || '<div class="loading">No conditions available</div>';
            } catch (error) {
                document.getElementById('conditionsContent').innerHTML = `<div class="error-message">Error: ${error.message}</div>`;
            }
        }

        async function executeAction(namespace, name, action) {
            if (!confirm(`Are you sure you want to ${action} ${namespace}/${name}?`)) {
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/api/v1/dashboard/nodes/${namespace}/${name}/actions`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action })
                });

                const result = await response.json();
                if (result.success) {
                    alert(`Success: ${result.message}`);
                    loadDashboard();
                } else {
                    alert(`Failed: ${result.message || 'Unknown error'}`);
                }
            } catch (error) {
                alert(`Error: ${error.message}`);
            }
        }

        function closeModal(modalId) {
            document.getElementById(modalId).style.display = 'none';
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            if (event.target.classList.contains('modal')) {
                event.target.style.display = 'none';
            }
        }

        // Load dashboard on page load
        loadDashboard();
        initSearch();

        // Auto-refresh every 30 seconds
        setInterval(loadDashboard, 30000);
    </script>
</body>
</html>
